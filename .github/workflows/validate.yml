name: validate

env:
  # Extension support (`inline_core.extensions`) is newer than the last PyPI release, so CI installs
  # Core from source. Switch to `pip install inline-core` once a release ships with it.
  CORE_SOURCE: "inline-core @ git+https://github.com/inlineresearch/Inline-Core@main"

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install "${{ env.CORE_SOURCE }}"
      - name: Check Core supports extensions
        run: |
          python - <<'PY'
          import importlib.util, sys
          from importlib.metadata import version
          if importlib.util.find_spec("inline_core.extensions") is None:
              sys.exit(
                  f"The installed inline-core ({version('inline-core')}) has no extension support.\n"
                  "Point CORE_SOURCE at a Core build that ships inline_core.extensions."
              )
          PY
      - name: Validate entries
        run: python scripts/validate.py

  publish:
    # index.json is generated, never hand-edited, so the app always fetches a validated list.
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install "${{ env.CORE_SOURCE }}"
      - run: python scripts/validate.py --build
      - name: Commit index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --staged --quiet || git commit -m "chore: rebuild index"
          git push
